name: publish

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'v0.0.0'

jobs:
  # ── Create the git tag first so all parallel build jobs can attach to it ───
  create-tag:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.version || 'v1.0.0' }}" \
            -m "Release ${{ github.event.inputs.version || 'v1.0.0' }}"
          git push origin "${{ github.event.inputs.version || 'v1.0.0' }}"

  # ── macOS / Windows builds via tauri-action ─────────────────────────────────
  build-desktop:
    needs: create-tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13          # Intel x86_64
            args: '--target x86_64-apple-darwin'
          - platform: macos-latest      # Apple Silicon (M1+)
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Intel target
        if: matrix.args == '--target x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Add macOS ARM target
        if: matrix.args == '--target aarch64-apple-darwin'
        run: rustup target add aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.event.inputs.version || 'v1.0.0' }}
          releaseName: "RemmbrMe ${{ github.event.inputs.version || 'v1.0.0' }}"
          releaseBody: 'See the assets below to download the app for your platform.'
          releaseDraft: false
          prerelease: false

  # ── Linux AppImage (Ubuntu 22.04, WebKitGTK 4.1) ────────────────────────────
  build-linux-appimage:
    needs: create-tag
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libfuse2 \
            squashfs-tools \
            file

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ubuntu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-ubuntu-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: cargo-target-ubuntu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-target-ubuntu-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-ubuntu-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-ubuntu-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force software rendering so the WebView isn't blank on systems
          # without a compatible GPU compositor or DMA-BUF support.
          WEBKIT_DISABLE_DMABUF_RENDERER: '1'
          WEBKIT_DISABLE_COMPOSITING_MODE: '1'
        with:
          args: '--bundles appimage'
          tagName: ${{ github.event.inputs.version || 'v1.0.0' }}
          releaseName: "RemmbrMe ${{ github.event.inputs.version || 'v1.0.0' }}"
          releaseBody: 'See the assets below to download the app for your platform.'
          releaseDraft: false
          prerelease: false

  # ── Arch Linux tarball (native pacman + cargo, no AppImage tooling needed) ──
  build-arch:
    needs: create-tag
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Bootstrap pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm --needed \
            git base-devel nodejs npm rust \
            webkit2gtk-4.1 gtk3 glib2 libsoup3 \
            openssl pkg-config patchelf

      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-arch-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-arch-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-arch-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-arch-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: cargo-target-arch-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-target-arch-

      - name: Install JS dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Build Tauri binary
        run: cd src-tauri && cargo build --release

      - name: Package tarball
        run: |
          mkdir -p dist-arch
          cp src-tauri/target/release/remmbrme  dist-arch/remmbrme
          cp src-tauri/remmbrme.desktop          dist-arch/remmbrme.desktop
          cp src-tauri/icons/128x128.png         dist-arch/remmbrme.png
          tar -czf remmbrme-arch-x86_64.tar.gz \
            -C dist-arch remmbrme remmbrme.desktop remmbrme.png

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || 'v1.0.0' }}
          files: remmbrme-arch-x86_64.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

