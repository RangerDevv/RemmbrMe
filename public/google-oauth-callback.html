<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Sign-in Complete</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        max-width: 420px;
        padding: 24px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.3);
        text-align: center;
      }
      .muted {
        color: #94a3b8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 id="title">Finishing Google sign-in...</h2>
      <p id="message" class="muted">You can close this window.</p>
    </div>

    <script>
      (function () {
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');

        localStorage.setItem(
          'remmbrme_google_oauth_result',
          JSON.stringify({ code: code || undefined, state: state || undefined, error: error || undefined }),
        );

        if (error) {
          title.textContent = 'Google sign-in failed';
          message.textContent = error;
          return;
        }

        title.textContent = 'Google sign-in complete';
        message.textContent = 'Returning to RemmbrMe...';

        setTimeout(() => {
          try {
            if (window.opener && !window.opener.closed) {
              window.close();
              return;
            }
          } catch {}

          const syncUrl = window.location.origin + '/sync';
          window.location.replace(syncUrl);
        }, 500);
      })();
    </script>
  </body>
</html>
